<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Para Você</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Petit+Formal+Script&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="ceu">
      <span class="estrela e1"></span>
      <span class="estrela e2"></span>
      <span class="estrela e3"></span>
      <span class="estrela e4"></span>
      <span class="estrela e5"></span>
      <span class="estrela e6"></span>
    </div>

    <main class="cena">
      <p class="eyebrow">uma cartinha para você</p>

      <div class="envelope" id="envelope">
        <div class="corpo-envelope">
          <div class="aba-tras"></div>
        </div>

        <div class="cartao" id="cartao">
          <div class="imagens" id="imagens">
            <figure class="foto foto1">
              <img src="images/foto1.jpeg" alt="foto do casal, momento 1" />
            </figure>
            <figure class="foto foto2">
              <img src="images/foto2.jpeg" alt="foto do casal, momento 2" />
            </figure>
            <figure class="foto foto3">
              <img src="images/foto3.jpeg" alt="foto do casal, momento 3" />
            </figure>
          </div>

          <div class="mensagem" id="mensagem">
            <p class="mensagem-texto">
              Pepe vc e a melhor de todas
              <br />Obrigado por existir na minha vida
            </p>
            <p class="mensagem-assinatura">Te amo baby</p>
          </div>
        </div>

        <div class="lacre" id="lacre">
          <span>♥</span>
        </div>

        <div class="aba-frente"></div>
      </div>

      <button class="botao-abrir" id="botaoAbrir" type="button">
        abrir cartinha
      </button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
